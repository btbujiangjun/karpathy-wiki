    if (section === 'papers') {
      meta = `<span>👤 ${item.authors}</span><span>📅 ${item.year}</span>`;
      if (item.arxiv) meta += `<span><a href="https://arxiv.org/abs/${item.arxiv}" target="_blank">arXiv:${item.arxiv}</a></span>`;
    } else if (section === 'entities') {
      meta = `<span>🔖 ${item.type}</span>`;
    } else if (section === 'methods') {
      meta = `<span>📎 ${item.sources} source(s)</span>`;
    } else if (section === 'sources') {
      meta = `<span>📅 ${item.date}</span>`;
    } else if (section === 'synthesis') {
      meta = `<span>📅 ${item.date}</span>`;
    }
    const tags = section === 'entities' ? (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('') :
                 section === 'papers' ? `<span class="tag">arxiv ${item.year}</span>` :
                 section === 'sources' ? (item.tags || '').split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') :
                 section === 'methods' ? '' :
                 (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    return `<div class="card" data-name="${item.name.toLowerCase()}" data-tags="${(item.tags || []).join(' ').toLowerCase()} ${item.name.toLowerCase()}">
      <a class="card-title" href="wiki/${item.file}" target="_blank">${item.name}</a>
      ${meta ? `<div class="card-meta">${meta}</div>` : ''}
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>`;
  }).join('');
}

function render() {
  const sections = ['papers', 'sources', 'concepts', 'entities', 'methods', 'synthesis'];
  const titles = { papers: 'Papers', sources: 'Sources', concepts: 'Concepts', entities: 'Entities', methods: 'Methods', synthesis: 'Synthesis' };
  let html = '';
  let total = 0;
  sections.forEach(s => {
    const items = wikiData[s] || [];
    total += items.length;
    html += `<div class="section" id="section-${s}">
      <div class="section-title">${getIcon(s)} ${titles[s]} <span class="count">(${items.length})</span></div>
      <div class="card-grid">${renderCards(s, items)}</div>
    </div>`;
  });
  document.getElementById('content').innerHTML = html;
  document.getElementById('totalPages').textContent = total;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c => {
    const match = q === '' || c.dataset.name.includes(q) || c.dataset.tags.includes(q);
    c.classList.toggle('hidden', !match);
  });
  let visible = 0;
  document.querySelectorAll('.section').forEach(s => {
    const cards = s.querySelectorAll('.card:not(.hidden)');
    const count = cards.length;
    visible += count;
    const titleCount = s.querySelector('.count');
    if (titleCount) titleCount.textContent = `(${count})`;
    s.querySelectorAll('.empty').forEach(e => e.classList.toggle('hidden', count > 0));
  });
  document.getElementById('stats').textContent = q ? `搜索 "${q}": 找到 ${visible} 个结果` : '';
}

render();
</script>
</body>
</html>
